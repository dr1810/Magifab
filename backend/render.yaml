services:
  - type: web
    name: magifab-perception-backend
    runtime: python
    rootDir: backend
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn app:app --host 0.0.0.0 --port $PORT
    healthCheckPath: /health
    envVars:
      - key: MAGIFAB_ENVIRONMENT
        value: production
      - key: MAGIFAB_CORS_ORIGINS
        value: "*"
