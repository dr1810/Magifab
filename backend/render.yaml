services:
  - type: web
    name: magifab-movie-api
    runtime: docker
    rootDir: backend
    dockerfilePath: Dockerfile
    healthCheckPath: /health
    disk:
      name: magifab-movie-data
      mountPath: /app/cache
      sizeGB: 10
    envVars:
      - key: MAGIFAB_ENVIRONMENT
        value: production
      - key: MAGIFAB_CORS_ORIGINS
        value: "*"
